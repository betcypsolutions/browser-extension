<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulak — Ekran Görüntüsü</title>
  <style>
    :root {
      --bg: #0e1014; --panel: #15171c; --card: #1b1e25; --card-2: #21242c;
      --border: #2a2e38; --border-soft: #23262e;
      --text: #e9eaed; --muted: #8a8f99; --muted-2: #6b7079;
      --accent: #3b82f6; --accent-deep: #2563eb; --accent-soft: rgba(59,130,246,0.16);
      --ok: #22c55e; --danger: #ef4444;
      --r: 10px; --r-lg: 14px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); display: flex; flex-direction: column;
      overflow: hidden; font-size: 14px;
    }

    /* ---- Header ---- */
    header {
      display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0;
      padding: 0.7rem 1rem; border-bottom: 1px solid var(--border-soft);
      background: linear-gradient(180deg, var(--panel), var(--bg));
    }
    header h1 { font-size: 0.95rem; margin: 0; font-weight: 700; letter-spacing: 0.01em; display: flex; align-items: center; gap: 0.5rem; }
    header h1 .badge { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-deep)); box-shadow: 0 2px 8px rgba(37,99,235,0.4); display: inline-flex; align-items: center; justify-content: center; font-size: 14px; }
    header h1 .h1-sep { color: var(--muted-2); font-weight: 400; margin: 0 -0.15rem; }
    header .sub { margin-left: auto; font-size: 0.74rem; color: var(--muted); max-width: 46%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    main { flex: 1; min-height: 0; display: flex; }
    .stage { flex: 1; min-height: 0; display: none; flex-direction: column; }
    .stage.active { display: flex; }

    /* ---- Kırpma sahnesi ---- */
    .canvas-bg {
      flex: 1; min-height: 0; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 1.1rem;
      background-color: #101216;
      background-image: linear-gradient(45deg, #16191f 25%, transparent 25%), linear-gradient(-45deg, #16191f 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #16191f 75%), linear-gradient(-45deg, transparent 75%, #16191f 75%);
      background-size: 22px 22px; background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    }
    .crop-wrap { position: relative; line-height: 0; cursor: crosshair; border-radius: 8px; overflow: hidden; box-shadow: 0 6px 26px rgba(0,0,0,0.5); }
    .crop-wrap img { display: block; max-width: 100%; max-height: 100%; user-select: none; -webkit-user-drag: none; }
    .selection { position: absolute; border: 2px solid var(--accent); background: rgba(59,130,246,0.14); pointer-events: none; display: none; box-shadow: 0 0 0 1px rgba(255,255,255,0.25); }
    .dim { position: absolute; inset: 0; background: rgba(0,0,0,0.4); pointer-events: none; display: none; }

    /* ---- İşaretleme araç çubuğu ---- */
    .ann-toolbar {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.8rem; flex-wrap: wrap; flex-shrink: 0;
      border-bottom: 1px solid var(--border-soft); background: var(--panel);
    }
    .grp { display: flex; align-items: center; gap: 0.28rem; padding: 0.2rem; border-radius: 11px; background: var(--card); border: 1px solid var(--border-soft); }
    .sep { flex: 1; }
    .tool {
      width: 34px; height: 34px; border-radius: 8px; border: 1px solid transparent; background: transparent;
      color: var(--text); cursor: pointer; font-size: 15px; display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
    }
    .tool:hover { background: var(--card-2); }
    .tool.active { background: var(--accent-soft); border-color: var(--accent); }
    .sw { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.12); cursor: pointer; padding: 0; transition: transform 0.1s; }
    .sw:hover { transform: scale(1.12); }
    .sw.active { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
    .w { width: 30px; height: 30px; border-radius: 7px; border: 1px solid transparent; background: transparent; color: var(--text); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .w:hover { background: var(--card-2); }
    .w.active { background: var(--accent-soft); border-color: var(--accent); }
    .w .dot { background: currentColor; border-radius: 50%; display: block; }
    .w[data-w="1"] .dot { width: 4px; height: 4px; }
    .w[data-w="2"] .dot { width: 8px; height: 8px; }
    .w[data-w="3.5"] .dot { width: 13px; height: 13px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 15px; display: inline-flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: var(--card-2); }
    #annCanvas { max-width: 100%; max-height: 100%; cursor: crosshair; border-radius: 8px; box-shadow: 0 6px 26px rgba(0,0,0,0.5); touch-action: none; }

    /* ---- Sohbet seç ---- */
    .picker { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 0.9rem 1rem 0.3rem; }
    .preview {
      display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem;
      padding: 0.7rem; border: 1px solid var(--border-soft); border-radius: var(--r-lg); background: var(--card);
    }
    .preview img { width: 64px; height: 64px; object-fit: cover; border-radius: 9px; border: 1px solid var(--border); background: #0b0d11; cursor: zoom-in; transition: transform 0.12s, border-color 0.12s; }
    .preview img:hover { transform: scale(1.04); border-color: var(--accent); }
    .preview .meta { font-size: 0.78rem; color: var(--muted); }
    .prev-actions { display: flex; gap: 0.45rem; margin-left: auto; }

    .field { position: relative; margin-bottom: 0.6rem; }
    .field input.text {
      width: 100%; padding: 0.62rem 0.85rem; border-radius: var(--r); border: 1px solid var(--border);
      background: var(--card); color: var(--text); font: inherit; font-size: 0.9rem; outline: none; transition: border-color 0.12s, box-shadow 0.12s;
    }
    .field input.text:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .field.search input { padding-left: 2.1rem; }
    .field.search::before { content: "⌕"; position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; }

    /* Tanı toggle: switch görünümlü */
    .diag-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.7rem; cursor: pointer; user-select: none; font-size: 0.84rem; color: var(--muted); }
    .diag-row input { position: absolute; opacity: 0; pointer-events: none; }
    .switch { width: 38px; height: 22px; border-radius: 999px; background: var(--card-2); border: 1px solid var(--border); position: relative; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; }
    .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--muted); transition: transform 0.15s, background 0.15s; }
    .diag-row input:checked + .switch { background: var(--accent-soft); border-color: var(--accent); }
    .diag-row input:checked + .switch::after { transform: translateX(16px); background: var(--accent); }
    .diag-row input:disabled + .switch { opacity: 0.4; }
    .diag-row:has(input:disabled) { opacity: 0.6; cursor: not-allowed; }
    .diag-row .chip { font-size: 0.68rem; color: var(--muted-2); background: var(--card); border: 1px solid var(--border-soft); padding: 0.05rem 0.4rem; border-radius: 999px; }

    /* mod + çoklu-seç araçları */
    .pick-tools { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.55rem; flex-wrap: wrap; }
    .seg { display: inline-flex; background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 2px; }
    .seg button { padding: 0.34rem 0.7rem; border: 0; background: transparent; color: var(--muted); cursor: pointer; font: inherit; font-size: 0.76rem; font-weight: 600; border-radius: 999px; display: inline-flex; align-items: center; gap: 0.3rem; transition: background 0.12s, color 0.12s; }
    .seg button.active { background: var(--accent-soft); color: #cfe0ff; box-shadow: inset 0 0 0 1px var(--accent); }
    .multi-toggle { margin-left: auto; padding: 0.36rem 0.7rem; border-radius: 999px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font: inherit; font-size: 0.76rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.3rem; transition: background 0.12s, border-color 0.12s, color 0.12s; white-space: nowrap; }
    .multi-toggle:hover { background: var(--card-2); }
    .multi-toggle.active { background: var(--accent-soft); border-color: var(--accent); color: #cfe0ff; }

    .chat-list { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 0.15rem; margin: 0 -0.25rem; padding: 0 0.25rem; }
    .list-label { font-size: 0.66rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-2); padding: 0.7rem 0.5rem 0.25rem; }
    .chat-item { display: flex; align-items: center; gap: 0.65rem; width: 100%; padding: 0.5rem 0.6rem; background: transparent; border: 1px solid transparent; border-radius: var(--r); color: var(--text); font: inherit; text-align: left; cursor: pointer; transition: background 0.1s, border-color 0.1s; }
    .chat-item:hover { background: var(--card); }
    .chat-item.selected { background: var(--accent-soft); border-color: var(--accent); }
    .chat-item .av { position: relative; width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--accent), var(--accent-deep)); color: #fff; font-weight: 700; font-size: 0.9rem; overflow: hidden; }
    .chat-item .av-check { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: var(--accent-deep); color: #fff; font-size: 1.15rem; font-weight: 800; }
    .chat-item.selected .av-check { display: flex; }
    .chat-item .info { min-width: 0; flex: 1; }
    .chat-item .info strong { display: block; font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item .info small { font-size: 0.72rem; color: var(--muted); }
    .chat-item .go { color: var(--muted-2); font-size: 1rem; opacity: 0; transition: opacity 0.1s; }
    .chat-item:hover .go { opacity: 1; }
    .empty { color: var(--muted); font-size: 0.85rem; padding: 1.4rem; text-align: center; }

    /* tam ekran (lightbox) */
    .lightbox { position: fixed; inset: 0; background: rgba(4,6,9,0.93); display: none; align-items: center; justify-content: center; z-index: 80; cursor: zoom-out; padding: 2rem; }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 96%; max-height: 96%; border-radius: 8px; box-shadow: 0 14px 54px rgba(0,0,0,0.65); }
    .lightbox-close { position: fixed; top: 16px; right: 20px; width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 1.1rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .lightbox-close:hover { background: var(--card-2); }

    /* ---- Footer ---- */
    footer { display: flex; align-items: center; gap: 0.6rem; padding: 0.7rem 1rem; flex-shrink: 0; border-top: 1px solid var(--border-soft); background: var(--panel); }
    .hint { font-size: 0.76rem; color: var(--muted); margin-right: auto; }
    .btn { padding: 0.55rem 1.05rem; border: 1px solid transparent; border-radius: var(--r); cursor: pointer; font: inherit; font-weight: 600; font-size: 0.84rem; transition: background 0.12s, border-color 0.12s, opacity 0.12s; display: inline-flex; align-items: center; gap: 0.35rem; }
    .btn-ghost { background: var(--card); color: var(--text); border-color: var(--border); }
    .btn-ghost:hover { background: var(--card-2); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-deep)); color: #fff; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-sm { padding: 0.42rem 0.7rem; font-size: 0.78rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Overlay / toast ---- */
    .overlay { position: fixed; inset: 0; background: rgba(6,8,11,0.62); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; z-index: 50; }
    .overlay.show { display: flex; }
    .toast { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.2rem 1.6rem; font-size: 0.92rem; max-width: 78%; text-align: center; box-shadow: 0 18px 48px rgba(0,0,0,0.5); animation: pop 0.14s ease-out; }
    @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .toast.ok { border-color: var(--ok); }
    .toast.err { border-color: var(--danger); }
    .toast .act { margin-top: 0.95rem; }
    .toast small { display: block; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: -3px; margin-right: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-soft); }
  </style>
</head>
<body>
  <header>
    <h1><span class="badge">📨</span> Ulak <span class="h1-sep">·</span> Ekran Görüntüsü</h1>
    <span class="sub" id="sourceTitle"></span>
  </header>

  <main>
    <!-- 1. Kırpma (yalnız bölge seçilemeyen sayfalarda fallback) -->
    <section class="stage active" id="cropStage">
      <div class="canvas-bg">
        <div class="crop-wrap" id="cropWrap">
          <img id="shot" alt="ekran görüntüsü" />
          <div class="dim" id="dim"></div>
          <div class="selection" id="selection"></div>
        </div>
      </div>
    </section>

    <!-- 2. İşaretle / bulanıklaştır -->
    <section class="stage" id="annStage">
      <div class="ann-toolbar">
        <div class="grp">
          <button type="button" class="tool active" data-tool="pen" title="Kalem">✏️</button>
          <button type="button" class="tool" data-tool="highlight" title="Fosforlu kalem">🖍️</button>
          <button type="button" class="tool" data-tool="arrow" title="Ok">↗</button>
          <button type="button" class="tool" data-tool="rect" title="Dikdörtgen">▭</button>
          <button type="button" class="tool" data-tool="ellipse" title="Daire / elips">◯</button>
          <button type="button" class="tool" data-tool="text" title="Metin">T</button>
          <button type="button" class="tool" data-tool="step" title="Numaralı adım (1·2·3)">①</button>
          <button type="button" class="tool" data-tool="blur" title="Bulanıklaştır (hassas veriyi gizle)">🌫️</button>
        </div>
        <div class="grp">
          <button type="button" class="sw active" data-color="#ef4444" style="background:#ef4444"></button>
          <button type="button" class="sw" data-color="#f59e0b" style="background:#f59e0b"></button>
          <button type="button" class="sw" data-color="#22c55e" style="background:#22c55e"></button>
          <button type="button" class="sw" data-color="#3b82f6" style="background:#3b82f6"></button>
          <button type="button" class="sw" data-color="#111111" style="background:#111111"></button>
          <button type="button" class="sw" data-color="#ffffff" style="background:#ffffff"></button>
        </div>
        <div class="grp">
          <button type="button" class="w" data-w="1" title="İnce"><span class="dot"></span></button>
          <button type="button" class="w active" data-w="2" title="Orta"><span class="dot"></span></button>
          <button type="button" class="w" data-w="3.5" title="Kalın"><span class="dot"></span></button>
        </div>
        <span class="sep"></span>
        <button type="button" class="icon-btn" id="undoBtn" title="Geri al">↶</button>
        <button type="button" class="icon-btn" id="redoBtn" title="İleri al">↷</button>
      </div>
      <div class="canvas-bg"><canvas id="annCanvas"></canvas></div>
    </section>

    <!-- 3. Sohbet seç -->
    <section class="stage" id="pickStage">
      <div class="picker">
        <div class="preview">
          <img id="previewImg" alt="kırpılmış" title="Büyütmek için tıkla" />
          <div class="meta" id="previewMeta"></div>
          <div class="prev-actions">
            <button type="button" class="btn btn-ghost btn-sm" id="fullBtn" title="Tam ekran önizle">⛶ Tam ekran</button>
            <button type="button" class="btn btn-ghost btn-sm" id="copyBtn" title="Panoya kopyala">⧉ Kopyala</button>
            <button type="button" class="btn btn-ghost btn-sm" id="dlBtn" title="Bilgisayara indir">⭳ İndir</button>
          </div>
        </div>

        <div class="field">
          <input class="text" id="caption" type="text" placeholder="İsteğe bağlı not ekle (görselle birlikte gider)…" autocomplete="off" maxlength="2000" />
        </div>

        <label class="diag-row">
          <input type="checkbox" id="diagToggle" />
          <span class="switch"></span>
          <span>Tanı bilgisi ekle <span class="chip" id="diagInfo"></span></span>
        </label>

        <div class="pick-tools">
          <div class="seg" id="modeSeg" role="group" aria-label="Gönderim modu">
            <button type="button" data-mode="confirm" class="active" title="Görsel sohbet kutusuna düşer, göndermeden önce sen onaylarsın">✏️ Sohbette onayla</button>
            <button type="button" data-mode="direct" title="Seçince anında gönderilir">⚡ Direkt gönder</button>
          </div>
          <button type="button" class="multi-toggle" id="multiToggle" title="Birden fazla sohbete gönder">⊕ Çoklu seç</button>
        </div>

        <div class="field search">
          <input class="text" id="search" type="text" placeholder="Sohbet ara…" autocomplete="off" />
        </div>

        <div class="chat-list" id="chatList"><div class="empty">Yükleniyor…</div></div>
      </div>
    </section>
  </main>

  <footer id="cropFooter">
    <span class="hint">Göndermek istediğin alanı sürükleyerek seç. Seçmezsen tüm görüntü gönderilir.</span>
    <button class="btn btn-ghost" id="cancelBtn">İptal</button>
    <button class="btn btn-primary" id="cropBtn">Kırp ve devam →</button>
  </footer>
  <footer id="annFooter" style="display:none">
    <span class="hint">İşaretle / bulanıklaştır (boş bırakabilirsin) → Devam.</span>
    <button class="btn btn-ghost" id="annCancelBtn">İptal</button>
    <button class="btn btn-primary" id="annNextBtn">Devam →</button>
  </footer>
  <footer id="pickFooter" style="display:none">
    <span class="hint" id="pickHint">Bir sohbete tıkla → kutuya düşsün, sohbette onayla.</span>
    <button class="btn btn-ghost" id="backBtn">← Geri</button>
    <button class="btn btn-primary" id="sendSelBtn" style="display:none">Seçilenlere gönder</button>
  </footer>

  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" alt="tam ekran önizleme" />
    <button type="button" class="lightbox-close" id="lightboxClose" title="Kapat (Esc)">✕</button>
  </div>

  <div class="overlay" id="overlay"><div class="toast" id="toast"></div></div>

  <script src="crop.js"></script>
</body>
</html>
